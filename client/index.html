<!doctype html>

<head>
<meta charset="utf-8">

<style>
  :root {
    --ink: #0a0806; --stone: #2a2118; --stone-lite: #4a3826; --bone: #e8dcc4;
    --flame-hot: #ffe08a; --flame-mid: #ff8c2e; --flame-deep: #d94f1e; --glowcap: #6fdc9c;
    --dim: #9b8a6c; --px: 0.5vmin;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--ink); }
  body { font-family: "VT323", monospace; color: var(--bone); }

  /* torch glow pools, flickering at stepped pixel-rates */
  .glow { position: absolute; width: 60vmin; height: 60vmin; border-radius: 50%; filter: blur(8vmin);
          background: radial-gradient(circle, rgba(255,140,46,.26), transparent 65%);
          animation: flicker 1.1s steps(5) infinite; pointer-events: none; }
  .glow.left  { left: 4vw; bottom: 2vh; }
  .glow.right { right: 4vw; bottom: 2vh; animation-duration: .9s; }
  @keyframes flicker {
    0%,100% { opacity: .9; transform: scale(1); }
    25% { opacity: .65; transform: scale(.96); }
    50% { opacity: 1;   transform: scale(1.04); }
    75% { opacity: .75; transform: scale(.98); }
  }

  /* pixel torch: stick + 3-frame box-shadow flame */
  .torch { position: absolute; bottom: 10vh; width: var(--px); height: var(--px); }
  .torch.left { left: 11vw; } .torch.right { right: 11vw; }
  .stick { position: absolute; top: calc(var(--px) * 6); left: calc(var(--px) * 3); width: calc(var(--px) * 2); height: calc(var(--px) * 10); background: var(--stone-lite); box-shadow: 0 calc(var(--px) * 10) 0 calc(var(--px)) var(--stone); }
  .flame { position: absolute; width: var(--px); height: var(--px); animation: burn .5s steps(1) infinite; }
  @keyframes burn {
    0%, 100% { box-shadow:
      calc(var(--px)*3) 0 var(--flame-hot), calc(var(--px)*4) 0 var(--flame-hot),
      calc(var(--px)*2) calc(var(--px)) var(--flame-mid), calc(var(--px)*3) calc(var(--px)) var(--flame-hot), calc(var(--px)*4) calc(var(--px)) var(--flame-mid), calc(var(--px)*5) calc(var(--px)) var(--flame-mid),
      calc(var(--px)*2) calc(var(--px)*2) var(--flame-mid), calc(var(--px)*3) calc(var(--px)*2) var(--flame-mid), calc(var(--px)*4) calc(var(--px)*2) var(--flame-deep), calc(var(--px)*5) calc(var(--px)*2) var(--flame-mid),
      calc(var(--px)*3) calc(var(--px)*3) var(--flame-deep), calc(var(--px)*4) calc(var(--px)*3) var(--flame-deep); }
    33% { box-shadow:
      calc(var(--px)*4) 0 var(--flame-hot),
      calc(var(--px)*3) calc(var(--px)) var(--flame-hot), calc(var(--px)*4) calc(var(--px)) var(--flame-mid), calc(var(--px)*5) calc(var(--px)) var(--flame-hot),
      calc(var(--px)*2) calc(var(--px)*2) var(--flame-mid), calc(var(--px)*3) calc(var(--px)*2) var(--flame-deep), calc(var(--px)*4) calc(var(--px)*2) var(--flame-mid), calc(var(--px)*5) calc(var(--px)*2) var(--flame-deep),
      calc(var(--px)*3) calc(var(--px)*3) var(--flame-deep), calc(var(--px)*4) calc(var(--px)*3) var(--flame-mid); }
    66% { box-shadow:
      calc(var(--px)*2) 0 var(--flame-hot), calc(var(--px)*3) 0 var(--flame-mid),
      calc(var(--px)*2) calc(var(--px)) var(--flame-mid), calc(var(--px)*3) calc(var(--px)) var(--flame-hot), calc(var(--px)*4) calc(var(--px)) var(--flame-hot),
      calc(var(--px)*2) calc(var(--px)*2) var(--flame-deep), calc(var(--px)*3) calc(var(--px)*2) var(--flame-mid), calc(var(--px)*4) calc(var(--px)*2) var(--flame-mid), calc(var(--px)*5) calc(var(--px)*2) var(--flame-deep),
      calc(var(--px)*3) calc(var(--px)*3) var(--flame-mid), calc(var(--px)*4) calc(var(--px)*3) var(--flame-deep); }
  }

  .wrap { position: absolute; inset: 0; display: grid; place-items: center; text-align: center; padding: 6vmin; }
  .stack { display: grid; gap: 3.4vmin; max-width: 90vw; }
  .kicker { font-family: "Press Start 2P", monospace; font-size: 1.9vmin; color: var(--glowcap); letter-spacing: .5vmin;
            animation: blink 1.4s steps(2) infinite; }
  @keyframes blink { 50% { opacity: .25; } }
  h1 { font-family: "Press Start 2P", monospace; font-size: 9vmin; line-height: 1.2; color: var(--bone);
       text-shadow: 0 .6vmin 0 #000, 0 0 7vmin rgba(255,140,46,.4); }
  .sub { font-size: 3.6vmin; color: var(--flame-mid); }
  .body { font-size: 3vmin; color: var(--dim); line-height: 1.3; }
  .body a { color: var(--glowcap); text-decoration: none; border-bottom: .2vmin dotted var(--glowcap); }

  /* pixel CTA into the world */
  .play { justify-self: center; display: inline-block; font-family: "Press Start 2P", monospace; font-size: 1.5vmin;
          color: var(--ink); background: var(--flame-mid); text-decoration: none; padding: 1.3vmin 2.6vmin; letter-spacing: .3vmin;
          box-shadow: 0 .4vmin 0 var(--flame-deep), 0 0 3vmin rgba(255,140,46,.45);
          transition: transform .08s steps(2), background .08s, box-shadow .08s; }
  .play:hover { background: var(--flame-hot); box-shadow: 0 .4vmin 0 var(--flame-deep), 0 0 5vmin rgba(255,224,138,.65); }
  .play:active { transform: translateY(.3vmin); box-shadow: 0 .1vmin 0 var(--flame-deep), 0 0 3vmin rgba(255,140,46,.45); }

  .socials { display: flex; align-items: center; justify-content: center; gap: 2.4vmin; flex-wrap: wrap; }
  .socials a { display: inline-flex; align-items: center; gap: .8vmin; color: var(--bone); text-decoration: none; font-size: 2.6vmin; }
  .socials svg { width: 3vmin; height: 3vmin; display: block; }
  .socials .h { color: var(--glowcap); }

  .grain { position: absolute; inset: 0; pointer-events: none; opacity: .5; mix-blend-mode: overlay;
           background-image: repeating-conic-gradient(rgba(255,255,255,.04) 0% 25%, transparent 0% 50%); background-size: 3px 3px; }
  .scan { position: absolute; inset: 0; pointer-events: none; opacity: .12;
          background: repeating-linear-gradient(to bottom, transparent 0 2px, rgba(0,0,0,.7) 2px 4px); }
  .vig { position: absolute; inset: 0; pointer-events: none;
         background: radial-gradient(ellipse at center, transparent 42%, rgba(0,0,0,.85) 100%); }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
</style>
</head>
<body>
  <div class="glow left"></div><div class="glow right"></div>
  <canvas id="embers"></canvas>
  <div class="torch left"><div class="flame"></div><div class="stick"></div></div>
  <div class="torch right"><div class="flame"></div><div class="stick"></div></div>
  <div class="wrap">
    <div class="stack">
      <div class="kicker">&gt; pre-alpha · M0 · one zone is live_</div>
      <h1>tro.gg</h1>
      <div class="sub">a tiny multiplayer world, built live with PostHog Code</div>
      <div class="body">built from scratch, in public. step into the world, or come watch it happen.</div>

          <span class="h">twitch</span>

          <span class="h">youtube</span>
        </a>
        <a href="https://x.com/richardsolomou" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="#e8dcc4"><path d="M18.9 2H22l-7.6 8.7L23 22h-7l-5.5-7.2L4.2 22H1l8.1-9.3L1 2h7.2l5 6.6L18.9 2zm-2.4 18h1.9L6.2 3.9H4.1L16.5 20z"/></svg>
          <span class="h">@richardsolomou</span>

      </div>
      <a id="play" class="play" data-attr="play" href="/play">play</a>
    </div>
  </div>
  <div class="vig"></div><div class="grain"></div><div class="scan"></div>
  <script type="module" src="/src/landing.ts"></script>
  <script>
    // pixelated ember particles drifting up
    const cv = document.getElementById("embers"), cx = cv.getContext("2d");
    const fit = () => { cv.width = innerWidth; cv.height = innerHeight; };
    fit(); addEventListener("resize", fit);
    const colors = ["#ffe08a", "#ff8c2e", "#d94f1e", "#9b8a6c"];
    const px = () => Math.max(2, Math.round(innerHeight / 270));
    const parts = Array.from({ length: 32 }, () => spawn(true));
    function spawn(anywhere) {
      return { x: Math.random() * innerWidth,
               y: anywhere ? Math.random() * innerHeight : innerHeight + 10,
               v: .3 + Math.random() * .8, sway: Math.random() * Math.PI * 2,
               c: colors[Math.floor(Math.random() * colors.length)], life: .4 + Math.random() * .6 };
    }
    (function loop() {
      cx.clearRect(0, 0, cv.width, cv.height);
      const s = px();
      for (let i = 0; i < parts.length; i++) {
        const p = parts[i];
        p.y -= p.v; p.sway += .02; p.life -= .0012;
        cx.globalAlpha = Math.max(0, p.life);
        cx.fillStyle = p.c;
        cx.fillRect(Math.round((p.x + Math.sin(p.sway) * 18) / s) * s, Math.round(p.y / s) * s, s, s);
        if (p.y < -10 || p.life <= 0) parts[i] = spawn(false);
      }
      requestAnimationFrame(loop);
    })();
  </script>
