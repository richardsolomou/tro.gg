name: PR preview module

# Publishes the SpacetimeDB module to the production instance (spacetime.tro.gg)
# under a per-branch database (`trogg-<branch-slug>`), so each branch gets an
# isolated backend alongside the live `trogg` database. Databases are isolated
# from each other within the instance, so a preview cannot touch prod data. The
# matching frontend preview is built by Cloudflare Workers Builds, which derives
# the same slug from WORKERS_CI_BRANCH and points VITE_SPACETIMEDB_HOST at the
# instance.
#
# Triggered on `push` (not `pull_request`) to mirror that Cloudflare frontend
# preview, which also builds on branch push. This keeps frontend and backend in
# lockstep: a `pull_request` run is suppressed whenever the PR has a merge
# conflict (GitHub cannot build the test-merge ref), which would leave the
# frontend pointing at a database that was never published. `push` runs off the
# raw branch head, so a conflict never blocks it. `push` also never fires for
# forks, so SPACETIME_TOKEN is never exposed to untrusted code — unlike a
# `pull_request_target` workaround, which would.
#
# Lifecycle: preview-cleanup.yml deletes the database when a PR closes;
# preview-prune.yml sweeps databases whose branch has no open PR weekly. Preview
# data is disposable: if a branch changes schema in a way SpacetimeDB cannot
# auto-migrate, the publish below clears only that branch's database and
# republishes it (--delete-data=on-conflict) rather than blocking the preview.
#
# Reuses the SPACETIME_TOKEN secret (the identity that owns `trogg`); that identity
# owns the per-branch databases too, so it can publish and later delete them.

on:
  push:
    branches-ignore: [main]

concurrency:
  group: preview-module-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive database name
        id: db
        run: |
          slug=$(printf '%s' "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g' | cut -c1-40 | sed -E 's/^-+|-+$//g')
          if [ -z "$slug" ]; then
            echo "::error::Empty slug — refusing to publish a preview database."
            exit 1
          fi
          echo "name=trogg-$slug" >> "$GITHUB_OUTPUT"

      - name: Install SpacetimeDB CLI
        run: |
          curl -sSf https://install.spacetimedb.com | sh -s -- --yes
          echo "$HOME/.local/share/spacetime/bin/current" >> "$GITHUB_PATH"

      - name: Pin CLI version
        run: |
          spacetime version install 2.6.0 || true
          spacetime version use 2.6.0

      - name: Authenticate
        run: spacetime login --token "${{ secrets.SPACETIME_TOKEN }}"

      - name: Register production server
        run: spacetime server add trogg-prod --url https://spacetime.tro.gg || true

      - name: Publish preview database
        run: spacetime publish --server trogg-prod --module-path spacetimedb --delete-data=on-conflict "${{ steps.db.outputs.name }}" -y
