<title>tro.gg — a tiny multiplayer world, built in public</title>
<meta name="description" content="tro.gg is a tiny multiplayer browser game, built live and in public with PostHog Code. Step into the world — no signup.">

<meta property="og:description" content="A tiny multiplayer world, built live with PostHog Code. Step in — no signup.">

<style>
  /* self-hosted latin subsets (OFL), like the HUD's Baloo 2 — no font CDN round trips */
  @font-face {
    font-family: "Press Start 2P";
    src: url("/src/ui/fonts/press-start-2p-latin.woff2") format("woff2");
    font-weight: 400;
    font-display: swap;
  }
  @font-face {
    font-family: "VT323";
    src: url("/src/ui/fonts/vt323-latin.woff2") format("woff2");
    font-weight: 400;
    font-display: swap;
  }
  :root {
    --ink: #0a0806; --deep-ink: #241708; --bone: #e8dcc4;
    --flame-hot: #ffe08a; --flame-mid: #ff8c2e;
    --dim: #9b8a6c;
    /* the facet: chamfered corners, the low-poly cut the game HUD uses */
    --cut: 1.2vmin;
    --facet: polygon(
      var(--cut) 0, calc(100% - var(--cut)) 0, 100% var(--cut), 100% calc(100% - var(--cut)),
      calc(100% - var(--cut)) 100%, var(--cut) 100%, 0 calc(100% - var(--cut)), 0 var(--cut));
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--ink); }
  body { font-family: "VT323", monospace; color: var(--bone); }

  .wrap { position: absolute; inset: 0; z-index: 2; display: grid; place-items: center; text-align: center; padding: 6vmin; }
  .stack { position: relative; display: grid; gap: 3.4vmin; max-width: 90vw; }
  /* a soft ink pool behind the copy so it reads over the bright cave */
  .stack::before { content: ""; position: absolute; inset: -8vmin -10vmin; z-index: -1;
                   background: radial-gradient(ellipse at center, rgba(10,8,6,.72) 30%, transparent 72%); }
  h1 { font-family: "Press Start 2P", monospace; font-size: 9vmin; line-height: 1.2; color: var(--bone);
       text-shadow: 0 .6vmin 0 #000, 0 0 7vmin rgba(255,140,46,.4); }
  .sub { font-size: 3.6vmin; color: var(--flame-mid); }
  .body { font-size: 3vmin; color: var(--dim); line-height: 1.3; }

  /* the CTA into the world: a faceted ember slab, hotter on hover */
  .play { justify-self: center; display: inline-block; font-family: "Press Start 2P", monospace; font-size: 1.5vmin; letter-spacing: .3vmin;
          color: var(--deep-ink); background: var(--flame-mid); text-decoration: none; padding: 1.5vmin 5vmin;
          clip-path: var(--facet); filter: drop-shadow(0 .5vmin 0 rgba(0,0,0,.45)) drop-shadow(0 0 3vmin rgba(255,140,46,.35));
          transition: background .12s, transform .08s, filter .12s; }
  .play:hover { background: var(--flame-hot); filter: drop-shadow(0 .5vmin 0 rgba(0,0,0,.45)) drop-shadow(0 0 5vmin rgba(255,224,138,.5)); }
  .play:active { transform: translateY(.3vmin); filter: drop-shadow(0 .15vmin 0 rgba(0,0,0,.45)); }

  .socials { display: flex; align-items: center; justify-content: center; gap: 2.4vmin; flex-wrap: wrap; }
  .socials a { display: inline-flex; align-items: center; color: var(--bone); text-decoration: none;
               opacity: .85; transition: opacity .12s, transform .08s; }
  .socials a:hover { opacity: 1; transform: translateY(-.3vmin); }
  .socials svg { width: 3.6vmin; height: 3.6vmin; display: block; }

  /* live-now pill — revealed only while the Twitch channel is streaming */
  .live { justify-self: center; display: inline-flex; align-items: center; gap: 1vmin; text-decoration: none;
          font-family: "Press Start 2P", monospace; font-size: 1.4vmin; letter-spacing: .2vmin; color: var(--bone);
          background: rgba(217,79,30,.2); clip-path: var(--facet); --cut: .9vmin; padding: 1vmin 2.4vmin; }
  /* the .live display rule above would otherwise override the hidden attribute's display:none */
  .live[hidden] { display: none; }
  .live:hover { background: rgba(217,79,30,.38); }
  .live .dot { width: 1.3vmin; height: 1.3vmin; border-radius: 50%; background: #ff3b3b;
               box-shadow: 0 0 1.4vmin #ff3b3b; animation: pulse 1.1s steps(1) infinite; }
  @keyframes pulse { 50% { opacity: .25; } }

  /* CRT dressing over everything: film grain and a vignette pulling the eye centre */
  .grain { position: absolute; inset: 0; z-index: 3; pointer-events: none; opacity: .4; mix-blend-mode: overlay;
           background-image: repeating-conic-gradient(rgba(255,255,255,.04) 0% 25%, transparent 0% 50%); background-size: 3px 3px; }
  .vig { position: absolute; inset: 0; z-index: 3; pointer-events: none;
         background: radial-gradient(ellipse at center, transparent 42%, rgba(0,0,0,.85) 100%); }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  #backdrop { z-index: 0; }
  #embers { z-index: 1; }
</style>

<body>

        </a>
      </div>
      <a id="play" class="play" data-attr="play" href="/play">play</a>
    </div>
  </div>
  <div class="vig"></div><div class="grain"></div>
  <script type="module" src="/src/landing.ts"></script>
  <script>
    // Pixelated ember particles drifting up. Inline on purpose: it animates
    // immediately, while the module graph (with the three.js chunk) downloads.
    const cv = document.getElementById("embers"), cx = cv.getContext("2d");
    const fit = () => { cv.width = innerWidth; cv.height = innerHeight; };
    fit(); addEventListener("resize", fit);
    const colors = ["#ffe08a", "#ff8c2e", "#d94f1e", "#9b8a6c"];
    const px = () => Math.max(2, Math.round(innerHeight / 270));
    const parts = Array.from({ length: 32 }, () => spawn(true));
    function spawn(anywhere) {
      return { x: Math.random() * innerWidth,
               y: anywhere ? Math.random() * innerHeight : innerHeight + 10,
               v: .3 + Math.random() * .8, sway: Math.random() * Math.PI * 2,
               c: colors[Math.floor(Math.random() * colors.length)], life: .4 + Math.random() * .6 };
    }
    (function loop() {
      cx.clearRect(0, 0, cv.width, cv.height);
      const s = px();
      for (let i = 0; i < parts.length; i++) {
        const p = parts[i];
        p.y -= p.v; p.sway += .02; p.life -= .0012;
        cx.globalAlpha = Math.max(0, p.life);
        cx.fillStyle = p.c;
        cx.fillRect(Math.round((p.x + Math.sin(p.sway) * 18) / s) * s, Math.round(p.y / s) * s, s, s);
        if (p.y < -10 || p.life <= 0) parts[i] = spawn(false);
      }
      requestAnimationFrame(loop);
    })();
  </script>
