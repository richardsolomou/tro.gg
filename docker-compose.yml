# Local Postgres + Redis, mirroring the prod backend so the server persists the
# same way it does in production. Matches the defaults in server/.env.example.
#   docker compose up -d
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: trogg
      POSTGRES_PASSWORD: trogg
      POSTGRES_DB: trogg
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trogg"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
