# Local Postgres + Valkey, mirroring the prod backend so the server persists the
# same way it does in production. Valkey speaks the Redis protocol, so the server
# still connects with REDIS_URL / a redis:// URL. Matches server/.env.example.
#   docker compose up -d --wait
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: trogg
      POSTGRES_PASSWORD: trogg
      POSTGRES_DB: trogg
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trogg"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  valkey-data:
